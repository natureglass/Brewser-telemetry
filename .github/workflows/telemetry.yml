name: telemetry
on:
  repository_dispatch:
    types: [telemetry]
permissions:
  contents: write
jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Route telemetry events
        env:
          DATA: ${{ github.event.client_payload.data }}
        run: |
          set -euo pipefail

          sanitize() {
            # keep letters, digits, dot, underscore, hyphen; replace the rest with _
            printf '%s' "$1" | tr -c 'A-Za-z0-9._-' '_'
          }

          # Process each NDJSON line from the payload
          while IFS= read -r line; do
            if [ -z "$line" ]; then
              continue
            fi

            reqType=$(printf '%s' "$line"   | jq -r '.data.reqType // "unknown"')
            packageId=$(printf '%s' "$line" | jq -r '.data.packageId // "unknown"')
            userId=$(printf '%s' "$line"    | jq -r '.data.userId // "unknown"')

            pkg=$(sanitize "$packageId")
            usr=$(sanitize "$userId")

            case "$reqType" in
              like)
                dir="likes"
                file="$dir/${pkg}.ndjson"
                mkdir -p "$dir"
                printf '%s\n' "$line" >> "$file"
                ;;
              save)
                dir="saves"
                file="$dir/${pkg}__${usr}.ndjson"
                mkdir -p "$dir"
                printf '%s\n' "$line" >> "$file"
                ;;
              download)
                dir="downloads"
                file="$dir/${pkg}.ndjson"
                mkdir -p "$dir"
                # read current count (default 0), increment, write back.
                # Use full if-blocks (not "[ ] && ...") so nothing returns a
                # bare non-zero exit code that would trip `set -e`.
                current=0
                if [ -f "$file" ]; then
                  current=$(tr -cd '0-9' < "$file")
                  if [ -z "$current" ]; then
                    current=0
                  fi
                fi
                next=$(( current + 1 ))
                printf '%s' "$next" > "$file"
                ;;
              *)
                dir="misc"
                file="$dir/${pkg}.ndjson"
                mkdir -p "$dir"
                printf '%s\n' "$line" >> "$file"
                ;;
            esac
          done <<< "$DATA"

      - name: Aggregate ratings
        run: |
          set -euo pipefail

          # Build ratings.json from all likes/*.ndjson files.
          # For each package, count "stars" events and compute the average rating.
          out="ratings.json"

          if [ ! -d likes ] || [ -z "$(ls -A likes 2>/dev/null)" ]; then
            echo "No likes data; skipping aggregation."
            exit 0
          fi

          # Concatenate every likes file, keep only star ratings, then group
          # by packageId computing count + average (rounded to 2 decimals).
          cat likes/*.ndjson \
            | jq -c 'select(.data.data[0] == "stars")
                     | {packageId: .data.packageId, stars: (.data.data[1] // 0)}' \
            | jq -s '
                group_by(.packageId)
                | map({
                    packageId: .[0].packageId,
                    count: length,
                    average: ((map(.stars) | add) / length
                              | . * 100 | round / 100)
                  })
                | sort_by(.packageId)
              ' > "$out"

          echo "Wrote $out:"
          cat "$out"

      - name: Commit changes
        run: |
          set -euo pipefail
          # Commit only if something changed.
          # Use "git add -A" (stage everything) rather than naming folders:
          # naming a folder that does not exist makes git add fail with a
          # fatal error and stage NOTHING, which previously caused valid
          # writes to be silently dropped ("No changes to commit").
          git config user.name  "telemetry-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "telemetry: ${{ github.event.client_payload.count }} events"
            git push
          fi
