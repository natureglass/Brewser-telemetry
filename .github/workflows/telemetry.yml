name: telemetry
on:
  repository_dispatch:
    types: [telemetry]
permissions:
  contents: write
jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Route telemetry events
        env:
          DATA: ${{ github.event.client_payload.data }}
        run: |
          set -euo pipefail

          sanitize() {
            # keep letters, digits, dot, underscore, hyphen; replace the rest with _
            printf '%s' "$1" | tr -c 'A-Za-z0-9._-' '_'
          }

          # Process each NDJSON line from the payload
          while IFS= read -r line; do
            [ -z "$line" ] && continue

            reqType=$(printf '%s' "$line"   | jq -r '.data.reqType // "unknown"')
            packageId=$(printf '%s' "$line" | jq -r '.data.packageId // "unknown"')
            userId=$(printf '%s' "$line"    | jq -r '.data.userId // "unknown"')

            pkg=$(sanitize "$packageId")
            usr=$(sanitize "$userId")

            case "$reqType" in
              like)
                dir="likes"
                file="$dir/${pkg}.ndjson"
                mkdir -p "$dir"
                printf '%s\n' "$line" >> "$file"
                ;;
              save)
                dir="saves"
                file="$dir/${pkg}__${usr}.ndjson"
                mkdir -p "$dir"
                printf '%s\n' "$line" >> "$file"
                ;;
              download)
                dir="downloads"
                file="$dir/${pkg}.ndjson"
                mkdir -p "$dir"
                # read current count (default 0), increment, write back
                current=0
                if [ -f "$file" ]; then
                  current=$(tr -cd '0-9' < "$file")
                  [ -z "$current" ] && current=0
                fi
                printf '%s' "$(( current + 1 ))" > "$file"
                ;;
              *)
                dir="misc"
                file="$dir/${pkg}.ndjson"
                mkdir -p "$dir"
                printf '%s\n' "$line" >> "$file"
                ;;
            esac
          done <<< "$DATA"

          # Commit only if something changed
          git config user.name  "telemetry-bot"
          git config user.email "bot@users.noreply.github.com"
          git add likes saves downloads misc 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "telemetry: ${{ github.event.client_payload.count }} events"
            git push
          fi
